<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Your Appointment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    :root {
      --bg: #faf8f5;
      --card-bg: #ffffff;
      --primary: #a67c52;
      --border: #e0dad3;
      --text-main: #3a3a3a;
      --text-muted: #8a8a8a;
      --blue-soft: #f4f8ff;
      --blue-border: #d9e7ff;
      --blue-strong: #0d6efd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      flex: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--primary);
      margin: 14px auto 0;
      border-radius: 2px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.06);
      max-width: 540px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 16px;
      width: 100%;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="tel"],
    select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid #d6d6d6;
      border-radius: 10px;
      background: #fff;
      font-size: 16px;
      transition: 0.15s;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(166, 124, 82, 0.12);
      outline: none;
    }

    .phone-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phone-prefix {
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid #d6d6d6;
      border-radius: 10px;
      background: #f3f3f3;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .phone-input-group input {
      flex: 1;
    }

    .field-help {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }

    .services-container {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .service-card {
      position: relative;
    }

    .service-card input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .service-card label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      min-height: 68px;
      padding: 14px;
      border: 1px solid #d6d6d6;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .service-card label:hover {
      border-color: var(--blue-strong);
    }

    .service-card input[type="checkbox"]:checked + label {
      border-color: var(--blue-strong);
      background: #eaf2ff;
    }

    .service-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      color: #222;
    }

    .service-minutes {
      font-size: 13px;
      color: #666;
      line-height: 1.2;
    }

    .selected-staff-info {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--blue-border);
      background: var(--blue-soft);
      border-radius: 10px;
      font-size: 14px;
      color: #234;
      display: none;
    }

    #time-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    #time-buttons .time-btn {
      width: 100%;
      min-height: 56px;
      padding: 12px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
      line-height: 1.2;
      cursor: pointer;
    }

    #time-buttons .time-btn.selected {
      border-color: var(--blue-strong);
      background: #eaf2ff;
    }

    .btn-submit {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-submit:hover {
      background: #8e6844;
      box-shadow: 0 6px 18px rgba(166, 124, 82, 0.35);
    }

    #successPopup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .popup-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      padding: 32px 26px;
      text-align: center;
    }

    .popup-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 14px;
    }

    .popup-text {
      font-size: 14px;
      margin-bottom: 18px;
      color: var(--text-muted);
    }

    .popup-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .site-footer {
      width: 100%;
      text-align: center;
      padding: 24px 16px;
      margin-top: 40px;
      border-top: 1px solid #e9e9e9;
      background: #fafafa;
    }

    .site-footer p {
      margin: 4px 0;
    }

    .footer-credit {
      font-size: 12px;
      color: #888;
    }

    .footer-credit a {
      color: var(--blue-strong);
      text-decoration: none;
    }

    .footer-credit a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .services-container {
        grid-template-columns: 1fr;
      }

      #time-buttons {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      #time-buttons .time-btn {
        min-height: 52px;
        font-size: 15px;
        padding: 10px 8px;
      }
    }

    @media (max-width: 360px) {
      #time-buttons {
        grid-template-columns: 1fr;
      }
    }
    .admin-access {
  text-align: center;
  margin-top: 20px;
}

#adminDashboardBtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s ease;
}

#adminDashboardBtn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(166,124,82,0.06);
}
.btn-submit {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 16px 20px;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}

.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.btn-submit:active {
  transform: scale(0.97);
}
.site-footer {
  text-align: center;
  margin-top: 50px;
  padding: 20px 10px;
  color: var(--text-muted);
  font-size: 12px;
}

.footer-main {
  font-weight: 500;
  letter-spacing: 0.04em;
}

.footer-sub {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.7;
}

.brand {
  color: var(--primary);
  font-weight: 600;
}

.author {
  font-weight: 600;
  letter-spacing: 0.05em;
}
/* =========================
FOOTER PREMIUM
========================= */

.site-footer {
  margin-top: 60px;
  padding: 30px 20px;
  text-align: center;
  color: var(--text-muted);
}

.footer-divider {
  width: 60px;
  height: 2px;
  background: var(--primary);
  margin: 0 auto 18px auto;
  opacity: 0.6;
}

.footer-content {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.footer-brand {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--primary);
  letter-spacing: 0.05em;
}

.footer-meta {
  font-size: 12px;
  opacity: 0.8;
}

.footer-author {
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0.6;
}

.footer-author span {
  font-weight: 600;
  color: var(--text-main);
}
  </style>
</head>
<body>

  <div class="page">
    <div class="header">
      <div class="logo">JESSMAKEUP & NAILS</div>
      <div class="title">Book Your Appointment</div>
      <div class="subtitle">MANICURE • PEDICURE • SELF-CARE</div>
      <div class="divider"></div>
    </div>

   <div class="card">

  <form id="bookingForm">

    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" placeholder="Your name" required />
    </div>

    <div class="form-group">
      <label for="phone">WhatsApp number</label>
      <div class="phone-input-group">
        <span class="phone-prefix">+1</span>
        <input
          type="tel"
          id="phone"
          placeholder="5551234567"
          pattern="[0-9]{10}"
          maxlength="10"
          inputmode="numeric"
          required
        />
      </div>
      <small class="field-help">Enter a valid 10-digit US number</small>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" required />
    </div>

    <div class="form-group">
      <label>Select service</label>
      <div id="services-container" class="services-container"></div>
      <div id="selected-staff-info" class="selected-staff-info"></div>
    </div>

    <div class="form-group">
      <label for="date">Preferred date</label>
      <input type="date" id="date" required />
    </div>

    <div class="form-group">
      <label>Preferred time</label>
      <div id="time-buttons"></div>
      <input type="hidden" id="time" required />
    </div>

    <button type="submit" class="btn-submit">
      Request appointment
    </button>

  </form>

  <!-- ADMIN BUTTON -->
  <div class="admin-access">
    <button id="adminDashboardBtn" type="button">
      Admin Dashboard
    </button>
  </div>

</div>

  <div id="successPopup">
    <div class="popup-box">
      <div class="popup-title">✨ Appointment Received</div>
      <div class="popup-text">Your appointment request has been received successfully.</div>
      <button class="popup-btn" id="popupOkBtn">OK</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://sheetdb.io/api/v1/vjwpuzqkosor4";
    const BUSINESS_WHATSAPP = "1352621474116";

    let SETTINGS = [];
    let DURATIONS = [];
    let CONFIG = [];
    let HOLIDAYS = [];

    const servicesContainer = document.getElementById("services-container");
    const timeButtonsContainer = document.getElementById("time-buttons");
    const timeInput = document.getElementById("time");
    const dateInput = document.getElementById("date");

    document.addEventListener("DOMContentLoaded", async () => {
      CONFIG = await fetch(`${API_BASE}?sheet=SettingsConfig`).then(r => r.json());
      DURATIONS = await fetch(`${API_BASE}?sheet=Durations`).then(r => r.json());
      SETTINGS = await fetch(`${API_BASE}?sheet=Settings`).then(r => r.json());

      if (CONFIG[0] && CONFIG[0].Holidays) {
        HOLIDAYS = CONFIG[0].Holidays.split(",").map(d => d.trim());
      }

      renderServices();
      blockUnavailableDates();

      const yearEl = document.getElementById("year");
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    });

    function renderServices() {
      servicesContainer.innerHTML = "";

      DURATIONS.forEach((s, index) => {
        const serviceId = `service-${index}`;
        const minutes = parseInt(s.Minutes, 10) || 0;
        const staff = (s.Staff || "").trim();

        const card = document.createElement("div");
        card.className = "service-card";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = serviceId;
        checkbox.value = s.Service;
        checkbox.dataset.staff = staff;

        checkbox.addEventListener("change", () => {
          const isValid = validateSelectedServicesStaff();

          if (isValid) {
            updateSelectedStaffInfo();
            renderTimeButtons();
          } else {
            updateSelectedStaffInfo();
            timeButtonsContainer.innerHTML = "<p>Please select services from the same professional</p>";
            timeInput.value = "";
          }
        });

        const label = document.createElement("label");
        label.setAttribute("for", serviceId);

        const nameSpan = document.createElement("span");
        nameSpan.className = "service-name";
        nameSpan.textContent = s.Service;

        const minutesSpan = document.createElement("span");
        minutesSpan.className = "service-minutes";
        minutesSpan.textContent = `${minutes} min`;

        label.appendChild(nameSpan);
        label.appendChild(minutesSpan);

        card.appendChild(checkbox);
        card.appendChild(label);

        servicesContainer.appendChild(card);
      });
    }

    function validateSelectedServicesStaff() {
      const selectedServices = [...document.querySelectorAll("#services-container input:checked")];

      if (!selectedServices.length) return true;

      const uniqueStaff = [
        ...new Set(
          selectedServices
            .map(input => (input.dataset.staff || "").trim())
            .filter(Boolean)
        )
      ];

      if (uniqueStaff.length > 1) {
        const checkedInputs = [...document.querySelectorAll("#services-container input:checked")];
        const lastChecked = checkedInputs[checkedInputs.length - 1];

        if (lastChecked) {
          lastChecked.checked = false;
        }

        alert("Selected services must belong to the same professional.");
        return false;
      }

      return true;
    }

    function getSelectedStaff() {
      const selectedServices = [...document.querySelectorAll("#services-container input:checked")];

      const uniqueStaff = [
        ...new Set(
          selectedServices
            .map(input => (input.dataset.staff || "").trim())
            .filter(Boolean)
        )
      ];

      return uniqueStaff.length === 1 ? uniqueStaff[0] : "";
    }

    function updateSelectedStaffInfo() {
      const staffInfo = document.getElementById("selected-staff-info");
      if (!staffInfo) return;

      const staff = getSelectedStaff();

      if (!staff) {
        staffInfo.style.display = "none";
        staffInfo.textContent = "";
        return;
      }

      staffInfo.style.display = "block";
      staffInfo.textContent = `You will be attended by: ${staff}`;
    }

    function blockUnavailableDates() {
      flatpickr("#date", {
        minDate: "today",
        disable: [...HOLIDAYS],
        dateFormat: "Y-m-d",
        onChange: function(selectedDates, dateStr) {
          if (HOLIDAYS.includes(dateStr)) {
            alert("This day is unavailable. Please select another date.");
            dateInput.value = "";
            return;
          }

          renderTimeButtons();
        }
      });
    }

    function generateSlots() {
      const slots = [];

      SETTINGS.forEach(row => {
        const hour = parseInt(row.Time.split(":")[0], 10);
        slots.push(`${hour.toString().padStart(2, "0")}:00`);
        slots.push(`${hour.toString().padStart(2, "0")}:30`);
      });

      return slots;
    }

    async function renderTimeButtons() {
      const date = dateInput.value;

      timeButtonsContainer.innerHTML = "";
      timeInput.value = "";

      if (!date) return;

      const selectedServices = [...document.querySelectorAll("#services-container input:checked")];

      if (!selectedServices.length) {
        timeButtonsContainer.innerHTML = "<p>Select a service first</p>";
        return;
      }

      if (!validateSelectedServicesStaff()) {
        timeButtonsContainer.innerHTML = "<p>Please select services from the same professional</p>";
        return;
      }

      const selectedStaff = getSelectedStaff();

      if (!selectedStaff) {
        timeButtonsContainer.innerHTML = "<p>This service does not have an assigned professional</p>";
        return;
      }

      const appointments = await fetch(`${API_BASE}/search?sheet=Appointments&Date=${date}`).then(r => r.json());

      const booked = appointments
        .filter(a => a.Status === "Approved" && (a.Staff || "").trim() === selectedStaff)
        .map(a => a.Start);

      let totalMinutes = 0;

      selectedServices.forEach(s => {
        const row = DURATIONS.find(d => d.Service === s.value);
        if (row) totalMinutes += parseInt(row.Minutes, 10);
      });

      const durationSlots = Math.ceil(totalMinutes / 30);
      const allTimes = generateSlots();

      const lunchStart = parseInt(CONFIG[0].LunchStart.split(":")[0], 10);
      const lunchEnd = parseInt(CONFIG[0].LunchEnd.split(":")[0], 10);

      const now = new Date();
      const todayStr = now.toISOString().split("T")[0];
      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      allTimes.forEach(time => {
        const parts = time.split(":");

        const startHour = parseInt(parts[0], 10);
        const startMinute = parseInt(parts[1], 10);

        const startTotal = startHour * 60 + startMinute;
        const endTotal = startTotal + durationSlots * 30;
        const endHour = Math.floor(endTotal / 60);

        if (date === todayStr && startTotal <= currentMinutes) {
          return;
        }

        if (startHour < lunchEnd && endHour > lunchStart) return;

        let available = true;

        for (let i = 0; i < durationSlots; i++) {
          const minutes = startTotal + i * 30;
          const h = Math.floor(minutes / 60);
          const m = minutes % 60;
          const check = `${h.toString().padStart(2, "0")}:${m === 0 ? "00" : "30"}`;

          if (booked.includes(check)) {
            available = false;
            break;
          }
        }

        if (!available) return;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "time-btn";
        btn.dataset.time = time;

        const endMinutes = startTotal + durationSlots * 30;
        const endH = Math.floor(endMinutes / 60);
        const endM = endMinutes % 60;
        const endText = `${endH.toString().padStart(2, "0")}:${endM === 0 ? "00" : "30"}`;

        btn.textContent = `${time} - ${endText}`;

        btn.addEventListener("click", () => {
          document.querySelectorAll(".time-btn.selected").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          timeInput.value = time;
        });

        timeButtonsContainer.appendChild(btn);
      });

      if (timeButtonsContainer.children.length === 0) {
        timeButtonsContainer.innerHTML = "<p>No times available</p>";
      }
    }

    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();

      const date = dateInput.value;
      const start = timeInput.value;

      const cleanPhone = phone.replace(/\D/g, "");

      if (cleanPhone.length !== 10) {
        alert("Please enter a valid US phone number.");
        return;
      }

      if (!start) {
        alert("Please select a time");
        return;
      }

      const selectedServices = [...document.querySelectorAll("#services-container input:checked")];

      if (!selectedServices.length) {
        alert("Please select a service");
        return;
      }

      if (!validateSelectedServicesStaff()) {
        alert("Please select services from the same professional.");
        return;
      }

      const staff = getSelectedStaff();

      if (!staff) {
        alert("This service does not have an assigned professional.");
        return;
      }

      let totalMinutes = 0;

      selectedServices.forEach(s => {
        const row = DURATIONS.find(d => d.Service === s.value);
        if (row) totalMinutes += parseInt(row.Minutes, 10);
      });

      const startParts = start.split(":");
      const startTotal = parseInt(startParts[0], 10) * 60 + parseInt(startParts[1], 10);
      const endTotal = startTotal + totalMinutes;
      const endH = Math.floor(endTotal / 60);
      const endM = endTotal % 60;
      const end = `${endH.toString().padStart(2, "0")}:${endM === 0 ? "00" : "30"}`;

      const data = {
        Timestamp: new Date().toISOString(),
        Name: name,
        Phone: cleanPhone,
        Email: email,
        Date: date,
        Start: start,
        End: end,
        Services: selectedServices.map(s => s.value).join(", "),
        Staff: staff,
        Status: "Pending"
      };

      await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data })
      });

      const msg = encodeURIComponent(
`Hello JessMakeUP!

Appointment request:
Name: ${name}
Customer phone: +1${cleanPhone}
Email: ${email}
Professional: ${staff}
Date: ${date}
Time: ${start} - ${end}
Services: ${data.Services}

Thank you!`
      );

      window.location.href = `https://wa.me/${BUSINESS_WHATSAPP}?text=${msg}`;
    });

    document.getElementById("popupOkBtn").addEventListener("click", () => {
      document.getElementById("successPopup").style.display = "none";
    });
  </script>
  <script>
document.getElementById("adminDashboardBtn").onclick = () => {
  window.open("https://macarthurjp.github.io/bookings/dashboard.html", "_blank");
};
</script>
<footer class="site-footer">

  <div class="footer-divider"></div>

  <div class="footer-content">
    <div class="footer-brand">
      JessMakeUP & Nails
    </div>

    <div class="footer-meta">
      © 2026 · All rights reserved
    </div>

    <div class="footer-author">
      Crafted by <span>ArthurNoLimit</span>
    </div>
  </div>

</footer>
</body>
